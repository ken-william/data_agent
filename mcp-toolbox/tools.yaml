sources:
  my-bigquery-source:
    kind: bigquery
    project: theophane
    location: global
    # useClientOAuth: true
    allowedDatasets:
      - telco_demo

tools:
  conversational_analyst:
    kind: bigquery-conversational-analytics
    source: my-bigquery-source
    description: |
      Agent spécialiste de la Stratégie Data pour l'entreprise de telecom.
      Utilise cet outil conversationnal-analytics pour analyser les données(Structurées, non structurées) de l'entreprise via des requêtes SQL sur BigQuery. 
      Consult the `conversational_analyst` tool description for detailed examples on how to craft these queries.

      Les données sont disponibles dans le dataset `theophane.telco_demo`.

      **Tables de Données Disponibles :**
      Ces tables contiennent des données tabulaires classiques :
      - 'theophane.telco_demo.network_outages_enriched': Contient des données détaillées et enrichies sur les pannes réseau. C'est la source principale pour l'analyse des incidents.
      - 'theophane.telco_demo.network_outages' : Historique des pannes (date, durée, type d'incident).
      - 'theophane.telco_demo.cells' : Inventaire des cellules réseau (antennes) et leur état.
      - 'theophane.telco_demo.sites' : Localisation géographique des infrastructures réseau.
      - 'theophane.telco_demo.equipment' : Détails techniques du matériel réseau installé.
      - 'theophane.telco_demo.customers' : Profils des abonnés (segmentation, ancienneté).
      - 'theophane.telco_demo.customer_subscriptions' : Lien entre les clients et leurs abonnements.
      - 'theophane.telco_demo.usage_records' : Consommation réelle (voix/data) impactée par les pannes.
      - 'theophane.telco_demo.service_plans' : Détails des offres commerciales.

      **Optimisation des Requêtes :**
      - Génère toujours le SQL le plus efficace possible.
      - Utilise des clauses `WHERE` spécifiques pour filtrer les données au maximum côté BigQuery.
      - Privilégie les agrégations (`COUNT`, `SUM`, `AVG`, etc.) pour retourner des résultats concis.
      - **NE PAS** retourner de grandes quantités de lignes brutes. Si la question implique potentiellement de nombreux résultats, utilise `LIMIT` (par exemple, `LIMIT 10`) ou agrège les données.

      IMPORTANT : Lorsque vous appelez cet outil, vous devez remplir le paramètre `table_references` UNIQUEMENT avec les tables nécessaires à la requête, en utilisant leur chemin complet au format [{"projectId": "theophane", "datasetId": "telco_demo", "tableId": "..."}].
      Les tables disponibles sont : cells, customer_subscriptions, customers, equipment, network_outages, network_outages_enriched, service_plans, sites, usage_records.

toolsets:
  my_bq_toolset:
    - conversational_analyst
